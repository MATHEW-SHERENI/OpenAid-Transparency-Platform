spring.application.name=OpenAidTransparencyPlatform


server.port=8080

# Values are read from environment variables, with safe local-dev defaults
# after the ':'. In production you OVERRIDE these via real env vars, so no
# real secret ever needs to live in this file.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/openaid}
spring.datasource.username=${DB_USERNAME:openaid}
spring.datasource.password=${DB_PASSWORD:openaid}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Disable the Open Session In View pattern. With it off, lazy associations must
# be loaded inside the @Transactional service layer (not during JSON rendering),
# which surfaces N+1 problems early and keeps the web layer free of DB queries.
spring.jpa.open-in-view=false

# ===============================
# Security Configuration (JWT)
# ===============================

security.jwt.secret=${JWT_SECRET:dev-only-secret-change-me-in-production-min-32-bytes}
# Access-token lifetime in milliseconds (3600000 = 1 hour). No inline comments!
security.jwt.expiration=${JWT_EXPIRATION:3600000}

# Bootstrap admin account, created on first startup if it doesn't exist.
# OVERRIDE these (especially the password) via env vars in production!
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.email=${ADMIN_EMAIL:admin@openaid.local}
app.admin.password=${ADMIN_PASSWORD:admin12345}

# ===============================
# External data sources
# ===============================
worldbank.api.base-url=${WORLDBANK_API_BASE_URL:https://api.worldbank.org/v2}

# ===============================
# Swagger / OpenAPI Configuration
# ===============================

springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ===============================
# Logging Configuration
# ===============================

logging.level.org.springframework=INFO
logging.level.com.mathewshereni.open_aid_transparency=DEBUG

# ===============================
# Batch / Scheduler Configuration
# ===============================

spring.batch.job.enabled=false
# Create the Spring Batch metadata tables (BATCH_*) on PostgreSQL at startup.
spring.batch.jdbc.initialize-schema=always

# ===============================
# File Uploads / Reports
# ===============================

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# Actuator (Monitoring)
# ===============================

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

