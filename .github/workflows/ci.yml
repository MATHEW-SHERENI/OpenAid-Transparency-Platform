name: CI

# Run the full test suite on every push and on PRs targeting main.
on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest

    # The @SpringBootTest contextLoads test boots the whole app against a real
    # Postgres. We provide one as a service container, mapped to 5433 so the
    # app's default datasource URL (localhost:5433/openaid) works unchanged.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: openaid
          POSTGRES_USER: openaid
          POSTGRES_PASSWORD: openaid
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U openaid -d openaid"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make the Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run tests
        run: ./mvnw -B test
        env:
          # Match the Postgres service above. These mirror the local-dev defaults
          # in application.properties, but we set them explicitly for clarity.
          DB_URL: jdbc:postgresql://localhost:5433/openaid
          DB_USERNAME: openaid
          DB_PASSWORD: openaid

  frontend:
    name: Frontend lint, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm run test

      - name: Type-check & build
        run: npm run build
